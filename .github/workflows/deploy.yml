name: Deploy to GitHub Pages

on:
  # Runs after Test and CodeQL workflows complete successfully on push to main
  # NOTE: Workflow names must match the names in test.yml and codeql.yml
  # If workflow names change, update these references accordingly
  workflow_run:
    workflows: ["Test & Visual Regression", "CodeQL Advanced"]
    types:
      - completed
    branches: ["main"]

  # Allows manual deployment from Actions tab (bypasses checks)
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Verify that BOTH required workflows (Test and CodeQL) have succeeded
  # This job uses GitHub API to check the status of both workflows before allowing deployment
  verify-workflows:
    name: Verify All Workflows Passed
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    outputs:
      all_passed: ${{ steps.check.outputs.all_passed }}

    steps:
      - name: Check workflow statuses
        id: check
        uses: actions/github-script@v8
        with:
          script: |
            const ref = context.payload.workflow_run.head_sha;
            const requiredWorkflows = ['Test & Visual Regression', 'CodeQL Advanced'];

            // Get all workflow runs for this commit
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: ref,
              per_page: 100
            });

            // Check if all required workflows succeeded
            const workflowStatuses = {};
            for (const run of runs.workflow_runs) {
              if (requiredWorkflows.includes(run.name)) {
                workflowStatuses[run.name] = run.conclusion;
              }
            }

            console.log('Workflow statuses:', workflowStatuses);

            // Verify all required workflows succeeded
            const allPassed = requiredWorkflows.every(name => 
              workflowStatuses[name] === 'success'
            );

            core.setOutput('all_passed', allPassed);

            if (!allPassed) {
              core.setFailed('Not all required workflows have passed');
            }

  build:
    name: Build Jekyll Site for GitHub Pages
    runs-on: ubuntu-latest
    needs: verify-workflows
    # Only run if all workflows passed or if manually triggered
    if: github.event_name == 'workflow_dispatch' || needs.verify-workflows.outputs.all_passed == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true # Runs 'bundle install' and caches gems

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: jekyll

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v4
        with:
          # Deploy the Jekyll-built site from _site directory
          # Jekyll processes markdown, layouts, and includes to generate static HTML
          # The CNAME file is included in the build output
          path: ./_site

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post-deploy smoke check
        env:
          DEPLOY_URL: ${{ steps.deployment.outputs.page_url }}
        timeout-minutes: 5
        run: |
          python3 - <<'PY'
          import os, sys, time, socket, http.client, urllib.request, urllib.error
          url = os.environ.get("DEPLOY_URL")
          if not url:
              print("DEPLOY_URL not set", file=sys.stderr)
              sys.exit(2)
          total_wait_seconds = 180
          delay_seconds = 5
          timeout_seconds = 10
          deadline = time.monotonic() + total_wait_seconds
          attempt = 0
          last = None
          while True:
              remaining = deadline - time.monotonic()
              if remaining <= 0:
                  print(f"Smoke check failed: {url} (last: {last})", file=sys.stderr)
                  sys.exit(1)
              attempt += 1
              try:
                  req = urllib.request.Request(url, method="GET", headers={"User-Agent": "gh-actions-smoke"})
                  req_timeout = min(timeout_seconds, remaining)
                  with urllib.request.urlopen(req, timeout=req_timeout) as resp:
                      code = resp.getcode()
                  print(f"Attempt {attempt}: HTTP {code}")
                  print("Smoke check passed")
                  sys.exit(0)
              except urllib.error.HTTPError as e:
                  last = f"HTTPError {e.code}"
                  print(f"Attempt {attempt}: HTTPError {e.code}")
                  try:
                      e.close()
                  except OSError:
                      pass
              except (urllib.error.URLError, TimeoutError, socket.timeout, http.client.HTTPException, ConnectionResetError, ConnectionAbortedError, ConnectionRefusedError) as e:
                  last = f"{type(e).__name__}: {e!r}"
                  print(f"Attempt {attempt} error: {type(e).__name__}: {e!r}")
              remaining = deadline - time.monotonic()
              if remaining <= 0:
                  print(f"Smoke check failed: {url} (last: {last})", file=sys.stderr)
                  sys.exit(1)
              time.sleep(min(delay_seconds, remaining))
          PY


  notify-failure:
    name: Notify on production deploy failure
    needs: [deploy]
    if: ${{ always() && needs.deploy.result == 'failure' && (github.event_name != 'workflow_run' || github.event.workflow_run.head_branch == 'main') && (github.event_name == 'workflow_run' || github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create incident issue
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const workflowRun = context.payload && context.payload.workflow_run;
            const isWorkflowRun = Boolean(workflowRun);
            const deployRunUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const upstreamRunUrl = isWorkflowRun ? workflowRun.html_url : null;
            const sha = isWorkflowRun ? workflowRun.head_sha : context.sha;
            const branch = isWorkflowRun
              ? workflowRun.head_branch
              : (context.ref && context.ref.startsWith("refs/heads/") ? context.ref.substring("refs/heads/".length) : context.ref);

            const incidentLabelSpecs = [
              { name: "incident", color: "B60205" },
              { name: "deployment", color: "B60205" },
            ];
            const incidentLabels = incidentLabelSpecs.map((l) => l.name);
            const marker = "<!-- ffc-incident:prod-deploy-failure -->";

            // Best-effort: ensure labels exist without spamming 422s every run.
            try {
              const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
                owner,
                repo,
                per_page: 100,
              });
              const existingNames = new Set((existing || []).map((l) => l && l.name).filter(Boolean));
              for (const spec of incidentLabelSpecs) {
                if (existingNames.has(spec.name)) continue;
                try {
                  await github.rest.issues.createLabel({ owner, repo, name: spec.name, color: spec.color });
                } catch (e) {
                  core.warning(`Could not create label "${spec.name}": ${e && e.message ? e.message : e}`);
                }
              }
            } catch (e) {
              core.warning(`Could not list/create labels: ${e && e.message ? e.message : e}`);
            }

            const title = `Production deployment failed (${branch})`;
            const bodyLines = [
              `Deploy run: ${deployRunUrl}`,
            ];
            if (upstreamRunUrl) {
              bodyLines.push(`Upstream run: ${upstreamRunUrl}`);
            }
            bodyLines.push(
              "",
              `Ref: ${branch}`,
              `SHA: ${sha}`,
              "",
              marker,
              "_This issue was automatically created by the deploy workflow._"
            );
            const body = bodyLines.join("\n");

            async function findDuplicateIssueNumber() {
              const escapedTitle = title.replace(/"/g, "\\\"");
              const q = `repo:${owner}/${repo} is:issue is:open in:title "${escapedTitle}"`;
              try {
                const res = await github.rest.search.issuesAndPullRequests({ q, per_page: 10 });
                const items = (res && res.data && res.data.items) ? res.data.items : [];
                const matches = items.filter((item) => !item.pull_request && (item.title || "") === title);
                for (const m of matches) {
                  try {
                    const full = await github.rest.issues.get({ owner, repo, issue_number: m.number });
                    const fullBody = (full && full.data && full.data.body) ? full.data.body : "";
                    if (fullBody.includes(marker)) return m.number;
                  } catch (e) {
                    core.warning(`Could not validate possible duplicate issue body: ${e && e.message ? e.message : e}`);
                  }
                }
              } catch (e) {
                core.warning(`Search API failed for dedupe: ${e && e.message ? e.message : e}`);
              }

              // Fallback: page through open issues (bounded) and match by title + marker.
              try {
                const perPage = 100;
                const maxPages = 10;
                for (let page = 1; page <= maxPages; page++) {
                  const list = await github.rest.issues.listForRepo({
                    owner,
                    repo,
                    state: "open",
                    per_page: perPage,
                    page,
                  });
                  const data = (list && list.data) ? list.data : [];
                  const openIssues = data.filter((item) => !item.pull_request);
                  const dup = openIssues.find((issue) => (issue.title || "") === title && (issue.body || "").includes(marker));
                  if (dup) return dup.number;
                  if (data.length < perPage) break;
                }
                return null;
              } catch (e) {
                core.warning(`Could not list existing issues for dedupe: ${e && e.message ? e.message : e}`);
                return null;
              }
            }

            const duplicateNumber = await findDuplicateIssueNumber();
            if (duplicateNumber) {
              core.info(`Incident issue #${duplicateNumber} already exists; adding a comment.`);
              try {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: duplicateNumber,
                  body: [
                    "Another deployment failure was detected:",
                    "",
                    body,
                  ].join("\n"),
                });
              } catch (e) {
                core.warning(`Could not comment on incident issue: ${e && e.message ? e.message : e}`);
              }
              return;
            }

            let created;
            try {
              created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: incidentLabels,
              });
            } catch (e) {
              core.warning(`Could not create labeled incident issue: ${e && e.message ? e.message : e}`);
              try {
                created = await github.rest.issues.create({ owner, repo, title, body });
              } catch (e2) {
                core.warning(`Could not create incident issue: ${e2 && e2.message ? e2.message : e2}`);
                return;
              }
            }

            core.info(`Created incident issue #${created.data.number}`);
